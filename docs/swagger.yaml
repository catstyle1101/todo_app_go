host: 127.0.0.1:5050
info:
  contact: {}
  description: Todo application REST API Schema
  title: Golang ToDo Api
  version: "1.0"
paths:
  /statistics:
    get:
      parameters:
      - description: Фильтрация статистики по конкретному пользователю
        in: query
        name: user_id
        type: integer
      - description: Начало промежутка рассмотрения статистики (включительно), формат
          `YYYY-MM-DD`
        in: query
        name: from
        type: integer
      - description: Конец промежутка рассмотрения статистики (не включительно), формат
          `YYYY-MM-DD`
        in: query
        name: to
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение статистики
          schema:
            $ref: '#/definitions/cmd_internal_features_statistics_transport_http.StatisticsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Получение статистики по задачам с опциональной фильтрацией по user_id
        и/или по временному промежутку создания задач
      tags:
      - statistics
  /tasks:
    get:
      description: Получение списка задач с опциональной пагинацией и/или фильтрацией
        по ID автора задачи
      parameters:
      - description: Фильтрация по ID автора задачи
        in: query
        name: user_id
        type: integer
      - description: Размер страницы с задачами
        in: query
        name: limit
        type: integer
      - description: Смещение страницы с задачами
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Полученный список задач
          schema:
            items:
              $ref: '#/definitions/cmd_internal_features_tasks_transport_http.TaskDtoResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Список задач
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Создать новую задачу в системе.
      parameters:
      - description: CreateTask тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_internal_features_tasks_transport_http.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Успешно созданная задача
          schema:
            $ref: '#/definitions/cmd_internal_features_tasks_transport_http.CreateTaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Author not found
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Создать задачу
      tags:
      - tasks
  /tasks/{task_id}:
    delete:
      description: Удалить задачу из системы по его ID
      parameters:
      - description: ID удаляемой задачи
        in: path
        name: task_id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление пользователя
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Удалить задачу
      tags:
      - tasks
    get:
      description: Получение конкретной задачи по ее ID
      parameters:
      - description: ID получаемой задачи
        in: path
        name: task_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Задача успешно найдена
          schema:
            $ref: '#/definitions/cmd_internal_features_tasks_transport_http.GetTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Получить задачу
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: |-
        Изменение информации об уже существующей в системе задачи
        ### Логика обновления полей (three-state logic):
        1. **Поле не передано**: `description` игнорируется, значение в БД не меняется
        2. **Явно передано значение**: `{"description": "Выйти прогуляться"}` - устанавливает новое описание в БД
        3. **Передан `null`**: `{"description": null}` - очищает поле в БД (set NULL)
        Ограничения: `title` и `completed` не могут быть выставлены как `null`.
      parameters:
      - description: ID задачи для обновления
        in: path
        name: task_id
        required: true
        type: integer
      - description: PatchTaskRequest тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_internal_features_tasks_transport_http.PatchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешно измененная задача
          schema:
            $ref: '#/definitions/cmd_internal_features_tasks_transport_http.PatchTaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Изменить задачу
      tags:
      - tasks
  /users:
    get:
      description: Получение списка пользователей с опциональной пагинацией
      parameters:
      - description: Размер страницы с пользователями
        in: query
        name: limit
        type: integer
      - description: Смещение страницы с пользователями
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Полученный список пользователей
          schema:
            items:
              $ref: '#/definitions/cmd_internal_features_users_transport_http.UserDTOResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Список пользователей
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Создать нового пользователя в системе
      parameters:
      - description: CreateUser тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_internal_features_users_transport_http.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Успешно созданный пользователь
          schema:
            $ref: '#/definitions/cmd_internal_features_users_transport_http.CreateUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Создать пользователя
      tags:
      - users
  /users/{user_id}:
    delete:
      description: Удалить пользователя из системы по его ID
      parameters:
      - description: ID удаляемого пользователя
        in: path
        name: user_id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление пользователя
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Удалить пользователя
      tags:
      - users
    get:
      description: Получение конкретного пользователя по его ID
      parameters:
      - description: ID получаемого пользователя
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь успешно найден
          schema:
            $ref: '#/definitions/cmd_internal_features_users_transport_http.GetUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Получить пользователя
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: |-
        Изменение информации об уже существующем в системе пользователе
        ### Логика обновления полей (three-state logic):
        1. **Поле не передано**: `phone_number` игнорируется, значение в БД не меняется
        2. **Явно передано значение**: `{"phone_number": "+71112223344"}` - устанавливает новый номер в БД
        3. **Передан `null`**: `{"phone_number": null}` - очищает поле в БД (set NULL)
        Ограничения: `full_name` не может быть выставлен как `null`.
      parameters:
      - description: ID пользователя для обновления
        in: path
        name: user_id
        required: true
        type: integer
      - description: PatchUserRequest тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_internal_features_users_transport_http.PatchUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешно измененный пользователь
          schema:
            $ref: '#/definitions/cmd_internal_features_users_transport_http.PatchUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_catstyle1101_todo_app_go_cmd_internal_core_transport_http_response.ErrorResponse'
      summary: Изменить пользователя
      tags:
      - users
