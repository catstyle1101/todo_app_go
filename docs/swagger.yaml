basePath: /api/v1
definitions:
  cmd_internal_features_statistics_transport_http.StatisticsResponse:
    properties:
      tasks_average_completion_time:
        example: 5h32m12s
        type: string
      tasks_completed:
        example: 10
        type: integer
      tasks_completed_rate:
        example: 33.33333
        type: number
      tasks_created:
        example: 30
        type: integer
    type: object
  cmd_internal_features_tasks_transport_http.CreateTaskRequest:
    properties:
      author_user_id:
        example: 5
        type: integer
      description:
        example: Сделать домашнее задание до 19:00
        maxLength: 1000
        minLength: 1
        type: string
      title:
        example: Домашнее задание
        maxLength: 100
        minLength: 3
        type: string
    required:
    - author_user_id
    - title
    type: object
  cmd_internal_features_tasks_transport_http.CreateTaskResponse:
    properties:
      author_user_id:
        example: 5
        type: integer
      completed:
        example: false
        type: boolean
      completed_at:
        example: "null"
        type: string
      created_at:
        example: "2026-07-30T10:30:00Z"
        type: string
      description:
        example: Сделать до четверга домашнее задание по математике
        type: string
      id:
        example: 333
        type: integer
      title:
        example: Домашка
        type: string
      version:
        example: 4
