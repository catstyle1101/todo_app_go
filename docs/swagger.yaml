        example: "2026-07-30T10:30:00Z"
        type: string
      description:
        example: Сделать до четверга домашнее задание по математике
        type: string
      id:
        example: 333
        type: integer
      title:
        example: Домашка
        type: string
      version:
        example: 4
        type: integer
    type: object
  cmd_internal_features_tasks_transport_http.TaskDtoResponse:
    properties:
      author_user_id:
        example: 5
        type: integer
      completed:
        example: false
        type: boolean
      completed_at:
        example: "null"
        type: string
      created_at:
        example: "2026-07-30T10:30:00Z"
        type: string
      description:
        example: Сделать до четверга домашнее задание по математике
        type: string
      id:
